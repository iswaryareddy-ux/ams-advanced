# ============================================================
# Asset Management System - database configuration
# Edit these values to match your environment, then restart
# Tomcat so the new settings are picked up.
# ============================================================

# ---- MySQL (default) ----
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/ams_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=ams_user
db.password=ams_password

